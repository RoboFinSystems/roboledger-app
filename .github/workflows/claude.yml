name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  check-runner-availability:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      runners_available: ${{ steps.check.outputs.runners_available }}
      runner_type: ${{ steps.check.outputs.runner_type }}
      runner_config: ${{ steps.check.outputs.runner_config }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check runner availability
        id: check
        uses: ./.github/actions/runner-availability
        with:
          runner_labels: ${{ vars.RUNNER_LABELS || 'github-hosted' }}
          runner_scope: ${{ vars.RUNNER_SCOPE || 'both' }}
          # ACTIONS_TOKEN needed for org runner API access; falls back to github.token
          # which has limited permissions but action handles this gracefully
          github_token: ${{ secrets.ACTIONS_TOKEN || github.token }}

  claude:
    needs: [check-runner-availability]
    # SECURITY (M6): defense-in-depth author gate. On top of the action's own
    # permission check, only run when the triggering actor is a repo
    # OWNER/MEMBER/COLLABORATOR, so a drive-by comment/issue from an outside
    # account can never invoke Claude with repo secrets in scope.
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
      ) ||
      (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      )
    runs-on: ${{ fromJSON(needs.check-runner-availability.outputs.runner_config) }}
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      issues: read
      actions: read # Required for Claude to read CI results on PRs
      # id-token: write intentionally omitted (M6) — Claude authenticates with
      # CLAUDE_CODE_OAUTH_TOKEN and assumes no cloud (OIDC) role here, so GitHub
      # OIDC token-minting is not needed. Restore it only if a step needs OIDC.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'
