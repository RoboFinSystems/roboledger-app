Description: RoboLedger App Service - Amazon ECS Express Mode

Parameters:
  # Environment & AWS Configuration
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - staging
      - dev
    Description: Environment name (prod, staging, or dev)
    ConstraintDescription: Environment must be prod, staging, or dev

  AWSAccountId:
    Type: String
    Description: AWS Account ID for cross-account resources
    AllowedPattern: '[0-9]{12}'

  # Access Mode Configuration
  AppAccessMode:
    Type: String
    Default: public
    AllowedValues:
      - public
      - public-http
    Description: |
      App access mode:
      - public: CloudFront + custom domain + HTTPS (requires DomainName and HostedZoneId)
      - public-http: CloudFront with AWS DNS, no custom domain needed

  # Domain & DNS Configuration (required only when AppAccessMode=public)
  DomainName:
    Type: String
    Default: ''
    Description: Full domain name for the application (e.g., roboledger.ai). Required for public mode.

  HostedZoneId:
    Type: String
    Default: ''
    Description: Route53 Hosted Zone ID for the domain. Required for public mode.

  # S3 Bucket Configuration (passed from deploy-s3 workflow outputs)
  StaticAssetsBucketName:
    Type: String
    Description: S3 bucket name for static assets (from deploy-s3 workflow)

  StaticAssetsBucketArn:
    Type: String
    Description: S3 bucket ARN for static assets (from deploy-s3 workflow)

  StaticAssetsBucketDomainName:
    Type: String
    Description: S3 bucket regional domain name for static assets (from deploy-s3 workflow)

  # Container & Application Configuration
  ECRRepository:
    Type: String
    Description: ECR repository name
    Default: roboledger-app

  ECRImageTag:
    Type: String
    Description: Docker image tag
    Default: latest

  ContainerPort:
    Type: Number
    Default: 3000
    MinValue: 1
    MaxValue: 65535
    Description: Port the container listens on

  # ECS Express Compute Configuration
  Cpu:
    Type: String
    Default: '256'
    Description: CPU units for ECS task (256 = 0.25 vCPU, 512 = 0.5 vCPU, 1024 = 1 vCPU, 2048 = 2 vCPU)
    AllowedValues:
      - '256'
      - '512'
      - '1024'
      - '2048'

  Memory:
    Type: String
    Default: '512'
    Description: Memory in MiB for ECS task
    AllowedValues:
      - '512'
      - '1024'
      - '2048'
      - '3072'
      - '4096'

  # Auto-scaling Configuration
  CapacityMin:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 25
    Description: Minimum number of tasks for auto scaling

  CapacityMax:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 25
    Description: Maximum number of tasks for auto scaling

  # Secrets Configuration
  RoboSystemsSecretsArn:
    Type: String
    Description: ARN of the main application configuration secret
    AllowedPattern: ^arn:aws:secretsmanager:[a-z0-9-]+:[0-9]+:secret:.*$
    ConstraintDescription: Must be a valid Secrets Manager ARN

  # SNS Configuration
  NotificationEmail:
    Type: String
    Default: ''
    Description: Email address for admin notifications (leave empty to skip SNS setup)

  # Tagging Configuration
  ServiceTag:
    Type: String
    Default: RoboLedger
    Description: Tag value for Service identification

  ComponentTag:
    Type: String
    Default: App
    Description: Tag value for Component identification

Conditions:
  # Access mode conditions
  IsPublicMode: !Equals [!Ref AppAccessMode, 'public']
  IsPublicHttpMode: !Equals [!Ref AppAccessMode, 'public-http']

  # Check if SNS notification should be created
  CreateSNSTopic: !Not
    - !Equals
      - !Ref NotificationEmail
      - ''

  # Production + public mode: enables www.domain.com redirect to domain.com
  IsProductionPublic: !And
    - !Equals [!Ref Environment, 'prod']
    - !Equals [!Ref AppAccessMode, 'public']

Resources:
  # ACM Certificate (only for public mode with custom domain)
  # Note: CloudFront requires certificates to be in us-east-1
  AppCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: IsPublicMode
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      DomainName: !Ref DomainName
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      ValidationMethod: DNS
      SubjectAlternativeNames:
        - !Sub '*.${DomainName}'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # SNS Topic for Contact Form Notifications
  ContactFormTopic:
    Type: AWS::SNS::Topic
    Condition: CreateSNSTopic
    Properties:
      TopicName: !Sub roboledger-app-${Environment}-contact-form
      DisplayName: !Sub RoboLedger ${Environment} Contact Form
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # Email Subscription for Contact Form
  ContactFormEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: CreateSNSTopic
    Properties:
      Protocol: email
      TopicArn: !Ref ContactFormTopic
      Endpoint: !Ref NotificationEmail

  # IAM Role for ECS Task Execution (pulls images from ECR, writes logs, reads secrets)
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: !Sub roboledger-${Environment}-ecs-task-execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref RoboSystemsSecretsArn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # IAM Role for ECS Express Infrastructure (manages ALB, security groups, auto-scaling)
  ECSInfrastructureRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: !Sub roboledger-${Environment}-ecs-infrastructure
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccessInfrastructureForECSExpressServices
            Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSInfrastructureRoleforExpressGatewayServices
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # IAM Role for ECS Task (application-level AWS access: SNS publishing)
  ECSTaskRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: !Sub roboledger-${Environment}-ecs-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - !If
          - CreateSNSTopic
          - PolicyName: SNSPublishPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - sns:Publish
                  Resource:
                    - !Ref ContactFormTopic
          - !Ref AWS::NoValue
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # ECS Express Mode Service
  ECSExpressService:
    Type: AWS::ECS::ExpressGatewayService
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      ServiceName: !Sub roboledger-${Environment}
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      InfrastructureRoleArn: !GetAtt ECSInfrastructureRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      HealthCheckPath: /api/utilities/health
      PrimaryContainer:
        Image: !Sub ${AWSAccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}:${ECRImageTag}
        ContainerPort: !Ref ContainerPort
        Environment:
          - Name: NODE_ENV
            Value: production
          - Name: SNS_CONTACT_TOPIC_ARN
            Value: !If [CreateSNSTopic, !Ref ContactFormTopic, '']
          - Name: REQUIRE_CAPTCHA
            Value: 'true'
        Secrets:
          - Name: TURNSTILE_SECRET_KEY
            ValueFrom: !Sub '${RoboSystemsSecretsArn}:TURNSTILE_SECRET_KEY::'
      ScalingTarget:
        MinTaskCount: !Ref CapacityMin
        MaxTaskCount: !Ref CapacityMax
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # Bucket Policy for CloudFront Access
  StaticAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticAssetsBucketName
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${StaticAssetsBucketArn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # CloudFront Origin Access Control
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub roboledger-${Environment}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub RoboLedger ${Environment} Distribution
        Enabled: true
        PriceClass: PriceClass_100
        HttpVersion: http2
        Aliases: !If
          - IsPublicMode
          - [!Ref DomainName]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - IsPublicMode
          - AcmCertificateArn: !Ref AppCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        DefaultRootObject: ''
        Origins:
          - Id: S3-Static-Assets
            DomainName: !Ref StaticAssetsBucketDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref CloudFrontOAC
          - Id: ECS-Dynamic-Content
            DomainName: !GetAtt ECSExpressService.Endpoint
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: ECS-Dynamic-Content
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - DELETE
            - GET
            - HEAD
            - OPTIONS
            - PATCH
            - POST
            - PUT
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AllViewerExceptHostHeader
        CacheBehaviors:
          - PathPattern: /images/*
            TargetOriginId: S3-Static-Assets
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
          - PathPattern: /_next/static/*
            TargetOriginId: S3-Static-Assets
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # CloudFront Function for www to apex redirect
  WwwRedirectFunction:
    Type: AWS::CloudFront::Function
    Condition: IsProductionPublic
    Properties:
      Name: !Sub roboledger-app-${Environment}-www-redirect
      AutoPublish: true
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var host = request.headers.host.value;
          var uri = request.uri;
          var querystring = request.querystring;

          var newHost = host.replace(/^www\./, '');
          var qs = '';

          if (Object.keys(querystring).length > 0) {
            var params = [];
            for (var key in querystring) {
              var param = querystring[key];
              var encodedKey = encodeURIComponent(key);
              if (param.multiValue) {
                param.multiValue.forEach(function(v) {
                  params.push(encodedKey + '=' + encodeURIComponent(v.value));
                });
              } else if (param.value) {
                params.push(encodedKey + '=' + encodeURIComponent(param.value));
              } else {
                params.push(encodedKey);
              }
            }
            qs = '?' + params.join('&');
          }

          return {
            statusCode: 301,
            statusDescription: 'Moved Permanently',
            headers: {
              'location': { value: 'https://' + newHost + uri + qs },
              'cache-control': { value: 'max-age=31536000' }
            }
          };
        }
      FunctionConfig:
        Comment: Redirects www.roboledger.ai to roboledger.ai
        Runtime: cloudfront-js-2.0

  # CloudFront Distribution for www redirect
  WwwCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: IsProductionPublic
    Properties:
      DistributionConfig:
        Comment: !Sub RoboLedger ${Environment} WWW Redirect Distribution
        Enabled: true
        PriceClass: PriceClass_100
        HttpVersion: http2
        Aliases:
          - !Sub www.${DomainName}
        ViewerCertificate:
          AcmCertificateArn: !Ref AppCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: Dummy-Origin
            DomainName: !GetAtt ECSExpressService.Endpoint
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: Dummy-Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: false
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt WwwRedirectFunction.FunctionARN
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # Route 53 App Domain Record
  Route53Record:
    Type: AWS::Route53::RecordSet
    Condition: IsPublicMode
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Type: A
      Name: !Ref DomainName
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # Route 53 Record for www subdomain
  WwwRoute53Record:
    Type: AWS::Route53::RecordSet
    Condition: IsProductionPublic
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Type: A
      Name: !Sub www.${DomainName}
      AliasTarget:
        DNSName: !GetAtt WwwCloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  AppAccessMode:
    Description: Access mode for the application
    Value: !Ref AppAccessMode

  AppURL:
    Description: URL of the Application
    Value: !If
      - IsPublicMode
      - !Sub https://${DomainName}
      - !Sub https://${CloudFrontDistribution.DomainName}

  ECSServiceEndpoint:
    Description: ECS Express Mode service endpoint (direct access)
    Value: !GetAtt ECSExpressService.Endpoint

  ECSServiceArn:
    Description: ECS Express Mode service ARN
    Value: !GetAtt ECSExpressService.ServiceArn

  CertificateArn:
    Condition: IsPublicMode
    Description: ACM Certificate ARN
    Value: !Ref AppCertificate

  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution

  CloudFrontDomainName:
    Description: CloudFront Distribution Domain Name
    Value: !GetAtt CloudFrontDistribution.DomainName

  WwwCloudFrontDistributionId:
    Condition: IsProductionPublic
    Description: CloudFront Distribution ID for WWW redirect
    Value: !Ref WwwCloudFrontDistribution

  WwwCloudFrontDomainName:
    Condition: IsProductionPublic
    Description: CloudFront Distribution Domain Name for WWW redirect
    Value: !GetAtt WwwCloudFrontDistribution.DomainName

  StaticAssetsBucketName:
    Description: S3 Bucket for static assets
    Value: !Ref StaticAssetsBucketName

  Region:
    Description: AWS Region where the stack is deployed
    Value: !Ref AWS::Region

  ContactFormTopicArn:
    Condition: CreateSNSTopic
    Description: SNS Topic ARN for contact form notifications
    Value: !Ref ContactFormTopic

  PublicAccessInstructions:
    Condition: IsPublicMode
    Description: Instructions for accessing the app (public mode)
    Value: !Sub |
      App is configured for public access with custom domain.

      URL: https://${DomainName}

      CloudFront Distribution: ${CloudFrontDistribution.DomainName}
      ECS Service: ${ECSExpressService.Endpoint}

  PublicHttpAccessInstructions:
    Condition: IsPublicHttpMode
    Description: Instructions for accessing the app (public-http mode)
    Value: !Sub |
      App is configured for public HTTP access (no custom domain).

      URL: https://${CloudFrontDistribution.DomainName}

      ECS Service: ${ECSExpressService.Endpoint}
